<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>สมุดจดของลัคกี้</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app">
    <header class="header">
      <img src="lucky-portrait.jpg" alt="Lucky" class="avatar">
      <div class="header-text">
        <h1>สมุดจดของลัคกี้ <span class="notion-badge">Notion</span></h1>
        <span class="date" id="dateLabel"></span>
      </div>
    </header>

    <div id="loadingState" class="state-screen">
      <div class="loading-spinner"></div>
      <p>ลัคกี้กำลังโหลดข้อมูลค่ะ...</p>
    </div>

    <div id="errorState" class="state-screen" style="display:none;">
      <div class="error-icon">😿</div>
      <p>ลัคกี้โหลดข้อมูลไม่ได้ค่ะ</p>
      <p class="error-detail" id="errorMsg"></p>
      <button class="retry-btn" onclick="retry()">ลองอีกครั้ง 🔄</button>
    </div>

    <div id="content" style="display:none;">
      <div class="alert" id="alertBanner" style="display:none;">
        <span class="alert-icon">💊</span>
        <span class="alert-text">ยาเย็นยังไม่ได้ทานนะคะป๊า</span>
        <button class="alert-action" onclick="confirmMed()">ทานแล้ว ✅</button>
      </div>

      <div class="greeting" id="greetingText"></div>
      <div class="freshness" id="freshnessLabel"></div>

      <div class="card">
        <div class="card-label">💊 ยาวันนี้</div>
        <div id="medRows" class="med-rows"></div>
      </div>

      <div class="card">
        <div class="card-row-top">
          <div>
            <div class="card-label">📊 น้ำตาล</div>
            <div class="big-number" id="glucoseValue">—</div>
            <div class="unit">mg/dL</div>
          </div>
          <div class="badge-area" id="glucoseBadge"></div>
        </div>
        <div class="mini-chart" id="glucoseMini"></div>
      </div>

      <div class="card card-highlight" id="apptCard">
        <div class="card-label">📅 นัดหมอถัดไป</div>
        <div class="appt-layout">
          <div class="appt-left">
            <div class="appt-when">—</div>
            <div class="appt-time">—</div>
          </div>
          <div class="appt-right">
            <div class="appt-doctor">—</div>
            <div class="appt-where">—</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-row-top">
          <div>
            <div class="card-label">⚖️ น้ำหนัก</div>
            <div class="big-number" id="weightValue">—</div>
            <div class="unit">kg</div>
          </div>
          <div class="badge-area"><span class="badge neutral">คงที่</span></div>
        </div>
        <div class="mini-chart" id="weightMini"></div>
      </div>

      <div class="section-divider"><span>📋 รายละเอียด</span></div>

      <div class="card">
        <div class="card-label">📊 น้ำตาล 7 วัน</div>
        <div class="bar-chart" id="glucoseChart"></div>
        <div class="chart-days" id="chartDays"></div>
        <div class="legend">
          <span><i class="dot good"></i> &lt;140 ดี</span>
          <span><i class="dot warn"></i> 140-180</span>
          <span><i class="dot bad"></i> &gt;180 สูง</span>
        </div>
      </div>

      <div class="card">
        <div class="card-label">💊 ยา 7 วัน</div>
        <div class="compliance" id="complianceGrid"></div>
      </div>

      <div class="card">
        <div class="card-label">⚖️ น้ำหนัก 30 วัน</div>
        <div class="weight-chart" id="weightChart"></div>
      </div>

      <div class="card">
        <div class="card-label">📅 นัดหมอทั้งหมด</div>
        <div class="appt-list" id="apptList"></div>
      </div>

      <div class="card card-insights">
        <div class="card-label">🐕 สรุปจากลัคกี้</div>
        <div class="insight-list" id="insightList"></div>
      </div>

      <div style="height:32px;"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>

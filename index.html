<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>สมุดจดของลัคกี้</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app">
    <header class="header">
      <img src="lucky-portrait.jpg" alt="Lucky" class="avatar">
      <div class="header-text">
        <h1>สมุดจดของลัคกี้ <span class="notion-badge">Notion</span></h1>
        <span class="date" id="dateLabel"></span> <span class="meta-badge" id="metaBadge"></span>
      </div>
    </header>

    <div id="loadingState" class="state-screen">
      <div class="loading-spinner"></div>
      <p>ลัคกี้กำลังโหลดข้อมูลค่ะ...</p>
    </div>

    <div id="errorState" class="state-screen" style="display:none;">
      <div class="error-icon">😿</div>
      <p>ลัคกี้โหลดข้อมูลไม่ได้ค่ะ</p>
      <p class="error-detail" id="errorMsg"></p>
      <button class="retry-btn" onclick="retry()">ลองอีกครั้ง 🔄</button>
    </div>

    <div id="content" style="display:none;">
      <!-- Alert banner -->
      <div class="alert" id="alertBanner" style="display:none;">
        <i class="icon-miss" style="flex-shrink:0;"></i>
        <span class="alert-text">ยาเย็นยังไม่ได้ทานนะคะป๊า</span>
        <button class="alert-action" onclick="confirmMed()">ทานแล้ว</button>
      </div>

      <div class="greeting" id="greetingText"></div>

      <!-- Meds -->
      <div class="card">
        <div class="card-label"><span class="label-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="6" rx="3"/><line x1="12" y1="11" x2="12" y2="17"/></svg></span>ยาวันนี้</div>
        <div id="medRows" class="med-rows"></div>
      </div>

      <!-- Glucose -->
      <div class="card">
        <div class="card-label"><span class="label-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg></span>น้ำตาล</div>
        <div class="glucose-pair">
          <div class="glucose-slot">
            <div class="glucose-label">เช้า</div>
            <div class="glucose-val" id="glucoseMorningVal">—</div>
            <div class="glucose-badge" id="glucoseMorningBadge"></div>
          </div>
          <div class="glucose-divider"></div>
          <div class="glucose-slot">
            <div class="glucose-label">เย็น</div>
            <div class="glucose-val" id="glucoseEveningVal">—</div>
            <div class="glucose-badge" id="glucoseEveningBadge"></div>
          </div>
        </div>
      </div>

      <!-- Weight -->
      <div class="card">
        <div class="card-label"><span class="label-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M8 3H3v5M3 16v5h5M16 21h5v-5"/><circle cx="12" cy="12" r="4"/></svg></span>น้ำหนัก</div>
        <div class="glucose-pair">
          <div class="glucose-slot">
            <div class="glucose-label">เช้า</div>
            <div class="glucose-val" id="weightAMVal">—</div>
            <div class="unit">kg</div>
          </div>
          <div class="glucose-divider"></div>
          <div class="glucose-slot">
            <div class="glucose-label">เย็น</div>
            <div class="glucose-val" id="weightPMVal">—</div>
            <div class="unit">kg</div>
          </div>
        </div>
        <div class="weight-trend-row" id="weightTrendRow"></div>
      </div>

      <!-- Appointments (single section, grouped by month) -->
      <div class="card" id="apptSection">
        <div class="card-label"><span class="label-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>นัดหมอ</div>
        <div id="apptContent"></div>
      </div>

      <!-- Divider -->
      <div class="section-divider"><span>รายละเอียด</span></div>

      <!-- Glucose 7-day chart -->
      <div class="card">
        <div class="card-label"><span class="label-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 5-5"/></svg></span>น้ำตาล 7 วัน</div>
        <div class="bar-chart" id="glucoseChart"></div>
        <div class="chart-days" id="chartDays"></div>
        <div class="legend">
          <span><i class="dot good"></i> &lt;140 ดี</span>
          <span><i class="dot warn"></i> 140-180</span>
          <span><i class="dot bad"></i> &gt;180 สูง</span>
          <span class="legend-sep">|</span>
          <span>■ เช้า</span>
          <span>▤ เย็น</span>
        </div>
      </div>

      <!-- Med compliance -->
      <div class="card">
        <div class="card-label"><span class="label-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg></span>ยา 7 วัน</div>
        <div class="compliance-wrapper">
          <div class="compliance-row-labels">
            <span>เช้า</span>
            <span>เย็น</span>
          </div>
          <div class="compliance" id="complianceGrid"></div>
        </div>
      </div>

      <!-- Insights -->
      <div class="card card-insights">
        <div class="card-label"><span class="label-icon"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="7" cy="8" r="2"/><circle cx="17" cy="8" r="2"/><circle cx="5" cy="14" r="2"/><circle cx="19" cy="14" r="2"/><path d="M12 18c-2.5 0-4-1.5-4-3.5S9.5 11 12 11s4 1.5 4 3.5-1.5 3.5-4 3.5z"/></svg></span>สรุปจากลัคกี้</div>
        <div class="insight-list" id="insightList"></div>
      </div>

      <div style="height:32px;"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
